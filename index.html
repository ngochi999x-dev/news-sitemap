<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Sitemap Generator</title>
</head>
<body>
    <h1>News Sitemap Generator</h1>
    <p>Welcome to the News Sitemap Generator. This tool helps create a sitemap for news articles.</p>
    <form action="/generate-sitemap" method="post">
        <label for="article-url">Article URL:</label>
        <input type="text" id="article-url" name="article-url" required>
        <button type="submit">Add Article</button>
    </form>
</body>
</html>
